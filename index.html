<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John MacCormick — Navigation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f4f6f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a2e;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      font-weight: 700;
      line-height: 1.3;
      color: #1a1a2e;
    }

    header p {
      margin-top: 0.6rem;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #555;
      font-style: italic;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      width: 100%;
      max-width: 820px;
    }

    .card {
      flex: 1 1 300px;
      max-width: 360px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      padding: 2rem 1.75rem;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.13);
      outline: none;
    }

    .card-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a2e;
    }

    .card-subtitle {
      font-size: 0.9rem;
      color: #777;
    }

    .card-arrow {
      margin-top: auto;
      font-size: 1.1rem;
      color: #4a6fa5;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to John MacCormick's Navigation Page</h1>
    <p>Where are you heading?</p>
  </header>

  <main class="cards">
    <a class="card" href="https://users.dickinson.edu/~jmac/" target="_blank" rel="noopener noreferrer">
      <span class="card-icon">🎓</span>
      <span class="card-title">John MacCormick's Dickinson College Website</span>
      <span class="card-subtitle">Faculty page, courses, research, and more</span>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="https://thinkingaboutai.com/" target="_blank" rel="noopener noreferrer">
      <span class="card-icon">🤖</span>
      <span class="card-title">Thinking AI Book</span>
      <span class="card-subtitle">Resources and information for the book</span>
      <span class="card-arrow">→</span>
    </a>
  </main>
</body>
</html>
